<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="style-mobile.css">
</head>
<body>
    <main id="fundo-white">
        <h1>Lista de Tarefas</h1>

        <input id="button_nova_tarefa" type="button" value="+ Tarefa" onclick="adicionar()">

        <div id="div_list">
            <ul id="ul_tarefas">
                
            </ul>
        </div>
    </main>
    
    <div id="overlay">
        <div id="div_nova_tarefa">
            <label for="text_nova_tarefa">Tarefa: <input type="text" name="text_nova_tarefa" id="text_nova_tarefa"> </label>
        
            <label for="text_data">Data:                 <input type="date" name="text_data" id="text_data"> "Opcional"</label>
            <input id="nova_tarefa" type="button" value="Adicionar"
            onclick="adicao_tarefa()">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
